name: data-cleaning-env
version: "1.0"

description: A real-world data cleaning environment where an AI agent fixes messy tabular data by removing duplicates, filling missing values, and correcting invalid emails.

entrypoint: server.app:app

observation_space:
  type: object
  properties:
    data_preview:
      type: array
      items:
        type: object
    issues:
      type: array
      items:
        type: string

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - remove_duplicates
        - fill_missing
        - fix_email

reward:
  description: +1 for fixing missing values, +1 for correcting invalid emails, +0.5 for removing duplicates, -0.1 per step, +5 bonus when fully clean

tasks:
  - name: easy
    description: Remove all duplicate rows from the dataset
    success_criteria: No duplicate rows remain
    grade_endpoint: /grade?task=easy

  - name: medium
    description: Fill all missing and invalid age values
    success_criteria: No null or negative age values remain
    grade_endpoint: /grade?task=medium

  - name: hard
    description: Fully clean the dataset - fix duplicates, missing ages, and invalid emails
    success_criteria: Data has no issues at all
    grade_endpoint: /grade?task=hard