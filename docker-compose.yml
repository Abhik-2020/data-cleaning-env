version: "3.9"

services:

  # ── RL Environment Server ──────────────────────────────────────────
  server:
    build: .
    container_name: data-cleaning-server
    ports:
      - "7860:7860"
    volumes:
      - .:/app
    command: uvicorn server.app:app --host 0.0.0.0 --port 7860 --reload

  # ── Q-Learning Agent ───────────────────────────────────────────────
  agent:
    build: .
    container_name: data-cleaning-agent
    depends_on:
      - server
    volumes:
      - .:/app
    command: >
      sh -c "sleep 3 && python agent.py"

  # ── Inference (Rule-based cleaning) ───────────────────────────────
  inference:
    build: .
    container_name: data-cleaning-inference
    depends_on:
      - server
    volumes:
      - .:/app
    command: >
      sh -c "sleep 3 && python inference.py"
    profiles:
      - inference